<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro</title>

<style>
body{
font-family:sans-serif;
background:linear-gradient(120deg,#3f2a1d,#92400e);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:40px;
border-radius:20px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:#92400e;
color:white;
border:none;
border-radius:20px;
}

button:hover{background:#78350f;}
</style>
</head>

<body>

<div class="container">
<h2>Cadastro</h2>

<form action="index.html">
<input type="text" placeholder="Nome" required>
<input type="email" placeholder="Email" required>
<input type="password" placeholder="Senha" required>

<button>Cadastrar</button>
</form>

<p><a href="login.html">Já tem conta?</a></p>
</div>

</body>
</html>
